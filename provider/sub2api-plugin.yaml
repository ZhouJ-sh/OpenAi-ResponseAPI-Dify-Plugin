provider: sub2api-plugin
label:
  en_US: "Sub2apiPlugin"
description:
  en_US: "Dify LLM bridge for OpenAI-compatible /v1/responses endpoints."
  zh_Hans: "面向 OpenAI 兼容 /v1/responses 接口的 Dify LLM 插件桥接。"
  ja_JP: "OpenAI 互換の /v1/responses エンドポイント向け Dify LLM プラグインです。"
icon_small:
  en_US: "icon.svg"
icon_large:
  en_US: "icon.svg"
background: "#E5E7EB"
help:
  title:
    en_US: "Configure the Responses endpoint"
    zh_Hans: "配置 Responses 接口"
    ja_JP: "Responses エンドポイントを設定"
  url:
    en_US: "/v1/responses"
    zh_Hans: "/v1/responses"
    ja_JP: "/v1/responses"
supported_model_types:
  - llm
configurate_methods:
  - customizable-model
model_credential_schema:
  model:
    label:
      en_US: Model Name
      zh_Hans: 模型名称
      ja_JP: モデル名
    placeholder:
      en_US: Enter full model name
      zh_Hans: 输入完整模型名称
      ja_JP: 完全なモデル名を入力してください
  credential_form_schemas:
    - variable: api_key
      label:
        en_US: API Key
        zh_Hans: API Key
        ja_JP: API Key
      type: secret-input
      required: false
      placeholder:
        zh_Hans: 在此输入您的 API Key
        en_US: Enter your API Key
        ja_JP: APIキーを入力してください
    - variable: endpoint_url
      label:
        en_US: API endpoint URL
        zh_Hans: API 接口地址
        ja_JP: API エンドポイント URL
      type: text-input
      required: true
      placeholder:
        zh_Hans: 例如 https://your-host/v1
        en_US: Base URL, for example https://your-host/v1
        ja_JP: "例: https://your-host/v1"
    - variable: context_size
      label:
        en_US: Context size
        zh_Hans: 上下文长度
        ja_JP: コンテキスト長
      type: text-input
      required: true
      default: "4096"
      placeholder:
        en_US: Enter model context size
        zh_Hans: 输入模型上下文长度
        ja_JP: モデルのコンテキスト長を入力してください
extra:
  python:
    provider_source: provider/sub2api-plugin.py
    model_sources:
      - "models/llm/llm.py"
